name: Sync OpenClash Template

on:
  workflow_dispatch:
  schedule:
    - cron: "20 20 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build metafenliu.ini
        run: python3 scripts/build.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upstream/metafenliu.ini metafenliu.ini
          git diff --cached --quiet || git commit -m "sync upstream metafenliu"
          git push
